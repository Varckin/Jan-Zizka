services:
  chatsite:
    build: .
    container_name: chatsite
    user: "1000:1000"
    volumes:
      - ./media:/app/media
      - ./staticcollection:/app/staticcollection
    expose:
      - "8999"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - xyz

networks:
  xyz:
    external: true