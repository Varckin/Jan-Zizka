services:
  chatsite:
    build: .
    container_name: chatsite
    user: "1000:1000"
    volumes:
      - ./media:/app/media
      - ./staticcollection:/app/staticcollection
    expose:
      - "8999"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - xyz
    depends_on:
      - redis

  chatredis:
    image: redis:7-alpine
    container_name: chatsite-redis
    restart: unless-stopped
    volumes:
      - ./redis_data:/data
    networks:
      - xyz

networks:
  xyz:
    external: true