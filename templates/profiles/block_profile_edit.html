<div id="profile-card" class="fade-in">
    <h2 class="profile-edit-title">Edit profile</h2>
    
    <form
        method="post"
        action="{% url 'profile_edit' %}"
        enctype="multipart/form-data"
        class="profile-form js-profile-edit-form"
        data-profile-url="{% url 'profile' %}">
        {% csrf_token %}
    
        <div class="form-field">
            <label for="{{ form.first_name.id_for_label }}">First name</label>
            {{ form.first_name }}
        </div>
    
        <div class="form-field">
            <label for="{{ form.last_name.id_for_label }}">Last name</label>
            {{ form.last_name }}
        </div>
    
        <div class="form-field">
            <label for="{{ form.bio.id_for_label }}">Bio</label>
            {{ form.bio }}
        </div>
    
        <div class="form-field">
            <label for="{{ form.avatar.id_for_label }}">Avatar</label>
            {{ form.avatar }}
        </div>
    
        <div class="profile-form-actions">
            <button type="submit" class="profile-edit-btn">
                Save
            </button>
    
            <button
                type="button"
                class="profile-cancel-btn js-cancel-edit"
                data-profile-url="{% url 'profile' %}">
                Cancel
            </button>
        </div>
    </form>
</div>
