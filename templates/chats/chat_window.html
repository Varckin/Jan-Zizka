{% load static %}

<div id="chat-window" class="chat-window" 
     data-username="{{ recipient.username }}" 
     data-current-user="{{ current_user|default:request.user.username }}">
    
    <div class="chat-header">
        <a href="{% url 'messenger' %}" class="back-link">← Back</a>
        <h3>Chat with {{ recipient.username }}</h3>
    </div>

    <div id="chat-messages" class="chat-messages">
        {% for message in messages %}
            <div class="chat-message {% if message.author.username == request.user.username %}my-message{% else %}other-message{% endif %}">
                <p>{{ message.text }}</p>
                <span class="msg-time">{{ message.created_at|time:"H:i" }}</span>
            </div>
        {% empty %}
            <div id="empty-chat-state" class="empty-messages">No messages yet. Say hello!</div>
        {% endfor %}
    </div>

    <form id="chat-form" class="chat-form">
        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
        <button type="submit">Send</button>
    </form>
</div>
